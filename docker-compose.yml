services:
  xray-analyzer:
    image: ghcr.io/authfailed/xray-analyzer:latest
    env_file:
      - .env
    environment:
      - XRAY_BINARY_PATH=/app/xray-bin/xray
    command:
      - uv
      - run
      - xray-analyzer
      - serve
      - --file
      - /app/domains.txt
    ports:
      - "${METRICS_EXTERNAL_PORT:-9090}:9090"
    volumes:
      - ./logs:/app/logs
      - ./domains.txt:/app/domains.txt:ro
      - xray-data:/app/xray-bin
    restart: unless-stopped
    container_name: xray-analyzer
    networks:
      - xray-net

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_EXTERNAL_PORT:-9091}:9090"
    restart: unless-stopped
    container_name: prometheus
    networks:
      - xray-net
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/dashboard.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboard.json:/var/lib/grafana/dashboards/dashboard.json:ro
    ports:
      - "${GRAFANA_EXTERNAL_PORT:-3000}:3000"
    restart: unless-stopped
    container_name: grafana
    depends_on:
      - prometheus
    networks:
      - xray-net
    profiles:
      - monitoring

networks:
  xray-net:
    driver: bridge

volumes:
  xray-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
