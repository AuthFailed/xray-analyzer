services:
  xray-checker:
    image: kutovoys/xray-checker
    environment:
      - SUBSCRIPTION_URL=${SUBSCRIPTION_URL}
      - METRICS_PROTECTED=${METRICS_PROTECTED:-false}
      - METRICS_USERNAME=${METRICS_USERNAME:-}
      - METRICS_PASSWORD=${METRICS_PASSWORD:-}
      - PROXY_CHECK_INTERVAL=${PROXY_CHECK_INTERVAL:-300}
      - PROXY_CHECK_METHOD=${PROXY_CHECK_METHOD:-ip}
      - PROXY_TIMEOUT=${PROXY_TIMEOUT:-30}
      - METRICS_PORT=2112
      - LOG_LEVEL=${CHECKER_LOG_LEVEL:-info}
    ports:
      - "${CHECKER_EXTERNAL_PORT:-2112}:2112"
    restart: unless-stopped
    container_name: xray-checker
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:2112/metrics"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - xray-net
    profiles:
      - checker

  xray-analyzer:
    image: ghcr.io/authfailed/xray-analyzer:latest
    env_file:
      - .env
    environment:
      - XRAY_BINARY_PATH=/app/xray-bin/xray
      # Set CHECKER_API_URL only when running with the checker profile
      - CHECKER_API_URL=${CHECKER_API_URL:-}
    command:
      - uv
      - run
      - xray-analyzer
      - serve
      - --file
      - /app/domains.txt
    ports:
      - "${METRICS_EXTERNAL_PORT:-9090}:9090"
    volumes:
      - ./logs:/app/logs
      - ./domains.txt:/app/domains.txt:ro
      - xray-data:/app/xray-bin
    restart: unless-stopped
    container_name: xray-analyzer
    networks:
      - xray-net

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_EXTERNAL_PORT:-9091}:9090"
    restart: unless-stopped
    container_name: prometheus
    networks:
      - xray-net
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/dashboard.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboard.json:/var/lib/grafana/dashboards/dashboard.json:ro
    ports:
      - "${GRAFANA_EXTERNAL_PORT:-3000}:3000"
    restart: unless-stopped
    container_name: grafana
    depends_on:
      - prometheus
    networks:
      - xray-net
    profiles:
      - monitoring

networks:
  xray-net:
    driver: bridge

volumes:
  xray-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
