services:
  xray-checker:
    image: kutovoys/xray-checker
    environment:
      - SUBSCRIPTION_URL=${SUBSCRIPTION_URL}
      - METRICS_PROTECTED=${METRICS_PROTECTED:-false}
      - METRICS_USERNAME=${METRICS_USERNAME:-}
      - METRICS_PASSWORD=${METRICS_PASSWORD:-}
      - PROXY_CHECK_INTERVAL=${PROXY_CHECK_INTERVAL:-300}
      - PROXY_CHECK_METHOD=${PROXY_CHECK_METHOD:-ip}
      - PROXY_TIMEOUT=${PROXY_TIMEOUT:-30}
      - METRICS_PORT=2112
      - LOG_LEVEL=${CHECKER_LOG_LEVEL:-info}
    ports:
      - "${CHECKER_EXTERNAL_PORT:-2112}:2112"
    restart: unless-stopped
    container_name: xray-checker
    healthcheck:
      # kutovoys/xray-checker is Go/Alpine — use wget against /metrics
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:2112/metrics"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - xray-net

  xray-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # Always use internal Docker hostname — overrides whatever is in .env
      - CHECKER_API_URL=http://xray-checker:2112
      - XRAY_BINARY_PATH=/app/xray-bin/xray
    ports:
      - "${METRICS_EXTERNAL_PORT:-9090}:9090"
    volumes:
      - ./logs:/app/logs
      - xray-data:/app/xray-bin
    restart: unless-stopped
    container_name: xray-analyzer
    depends_on:
      xray-checker:
        condition: service_healthy
    networks:
      - xray-net

networks:
  xray-net:
    driver: bridge

volumes:
  xray-data:
    driver: local
